name: CI/CD — Lint, Test, Build, Deploy

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  # Job 1: Lint — Ruff 
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Ruff check
        run: uvx ruff check .

  # Job 2: Test — uv + pytest
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint                       # chỉ chạy test khi lint pass
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: a45839
          POSTGRES_PASSWORD: a45839
          POSTGRES_DB: a45839
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U a45839 -d a45839"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PG_HOST: localhost
      PG_PORT: "5432"
      PG_DB: a45839
      PG_USER: a45839
      PG_PASSWORD: a45839
      VECTOR_PG_HOST: localhost
      VECTOR_PG_PORT: "5432"
      VECTOR_PG_DB: a45839
      VECTOR_PG_USER: a45839
      VECTOR_PG_PASSWORD: a45839

      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'sk-or-ci-dummy' }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Bật extension pgvector
        run: |
          PGPASSWORD=a45839 psql -h localhost -U a45839 -d a45839 \
            -c "CREATE EXTENSION IF NOT EXISTS vector"

      - name: Cài dependencies (uv sync)
        run: uv sync --frozen

      - name: Chạy test 
        run: uv run pytest --cov-fail-under=0

  # Job 3: Build — build Docker image và push lên Docker Hub
  build:
    name: Build Docker image and Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test                       # chỉ build khi test pass
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Đăng nhập Docker Hub (bỏ qua trên pull_request để không lộ secret)
      - name: Login Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          # Chỉ push khi là push lên nhánh (PR thì chỉ build kiểm tra)
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kltn-chatbot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/kltn-chatbot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 4: Deploy — trigger Render pull image mới từ Docker Hub (chỉ nhánh main, sau khi build & push pass)
  deploy:
    name: Deploy lên Render
    runs-on: ubuntu-latest
    needs: build                      # chỉ deploy khi build & push image pass
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Kiểm tra đã cấu hình deploy hook chưa
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::Chưa cấu hình secret RENDER_DEPLOY_HOOK (Settings → Secrets → Actions)."
            exit 1
          fi

      - name: Trigger Render Deploy Hook
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Notify deployment
        run: echo "Đã trigger deploy commit ${{ github.sha }} lên production"
