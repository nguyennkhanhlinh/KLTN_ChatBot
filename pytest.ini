[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    integration: tests yeu cau ket noi DB va LLM API (bo qua voi -m "not integration")
addopts = -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=60
